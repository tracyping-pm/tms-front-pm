server {
    listen 80;

    # gzip config
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    root /usr/share/nginx/html;
    index index.html;

    # Cache control for static assets (umi build usually outputs under /assets)
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # No cache for config.js and index.html
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Optional API reverse proxy (kept for compatibility with existing /api/ usage)
    location /api/ {
        proxy_pass https://uat.example.invalid/api/;
        add_header X-Nginx-Proxy "Powered by Nginx";
        add_header X-Env "uat";
    }

    # UAM reverse proxy
    location /uam-api/ {
        proxy_pass https://uat-uam.example.invalid/api/;
        add_header X-Nginx-Proxy "Powered by Nginx";
        add_header X-Env "uat";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

