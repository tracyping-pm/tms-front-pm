name: CI

on:
  push:
    branches: [dev]
  pull_request:

permissions:
  contents: read
  actions: write

concurrency:
  group: tms-fe-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # - name: Typecheck
      #   run: pnpm run tsc

  build:
    runs-on: ubuntu-latest
    needs: [check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIBABA_REGISTRY }}
          username: ${{ secrets.ALIBABA_USERNAME }}
          password: ${{ secrets.ALIBABA_PASSWORD }}

      - name: Compute image tags
        id: vars
        shell: bash
        run: |
          echo "ref_name=$(echo "${GITHUB_REF#refs/*/}" | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "sha_full=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${GITHUB_REF#refs/heads/}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dev Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            TAG_VERSION=${{ steps.vars.outputs.tag_version }}
          tags: |
            ${{ secrets.ALIBABA_REGISTRY }}/dev/tms_front:${{ steps.vars.outputs.ref_name }}
            ${{ secrets.ALIBABA_REGISTRY }}/dev/tms_front:sha-${{ steps.vars.outputs.sha_short }}
            ${{ secrets.ALIBABA_REGISTRY }}/dev/tms_front:sha-${{ steps.vars.outputs.sha_full }}
          cache-from: type=registry,ref=${{ secrets.ALIBABA_REGISTRY }}/dev/tms_front:buildcache
          cache-to: type=registry,ref=${{ secrets.ALIBABA_REGISTRY }}/dev/tms_front:buildcache,mode=max

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          if echo "$KUBE_CONFIG" | base64 --decode > "$HOME/.kube/config" 2>/dev/null; then
            echo "Kubeconfig configured (base64)."
          else
            printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"
            echo "Kubeconfig configured (raw)."
          fi

      - name: Restart Deployment
        env:
          DEPLOYMENT_NAME: ${{ secrets.DEPLOYMENT_NAME }}
        run: |
          set -euo pipefail
          kubectl rollout restart "deployment/${DEPLOYMENT_NAME}"
          kubectl rollout status "deployment/${DEPLOYMENT_NAME}" --timeout=5m
