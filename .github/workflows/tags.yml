name: CI-TAG

on:
  push:
    tags: ['tms-fe-v*.*.*']

permissions:
  contents: read
  actions: write

concurrency:
  group: tms-fe-tag-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: tms_front
  IMAGE_TAG: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set TAG_VERSION from tag
        run: |
          echo "TAG_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIBABA_REGISTRY }}
          username: ${{ secrets.ALIBABA_USERNAME }}
          password: ${{ secrets.ALIBABA_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            TAG_VERSION=${{ env.TAG_VERSION }}
          tags: |
            ${{ secrets.ALIBABA_REGISTRY }}/dev/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ secrets.ALIBABA_REGISTRY }}/dev/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.ALIBABA_REGISTRY }}/dev/${{ env.IMAGE_NAME }}:buildcache,mode=max

